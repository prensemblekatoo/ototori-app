<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクテスト専用</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #000; color: #0f0; }
        #vol-num { font-size: 40px; font-weight: bold; margin: 20px; }
        #bar-container { width: 100%; height: 50px; background: #333; border-radius: 25px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>マイク診断モード</h2>
    <button id="btn">ここを押してマイク開始</button>
    
    <div id="vol-num">0.00000</div>
    
    <div id="bar-container">
        <div id="bar"></div>
    </div>

    <p id="msg">ボタンを押して、何か音を立ててください</p>

    <script>
        const btn = document.getElementById('btn');
        const volNum = document.getElementById('vol-num');
        const bar = document.getElementById('bar');
        const msg = document.getElementById('msg');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const data = new Float32Array(analyser.fftSize);
                btn.style.display = 'none';
                msg.innerText = "マイク稼働中！";

                function check() {
                    analyser.getFloatTimeDomainData(data);
                    let sum = 0;
                    for(let i=0; i<data.length; i++) sum += data[i] * data[i];
                    let volume = Math.sqrt(sum / data.length);
                    
                    // 数値とバーを表示
                    volNum.innerText = volume.toFixed(5);
                    bar.style.width = Math.min(100, volume * 500) + "%";

                    if(volume > 0.01) msg.innerText = "音を検知しました！！";
                    
                    requestAnimationFrame(check);
                }
                check();
            } catch (err) {
                msg.innerText = "エラー: " + err;
                alert("マイクを許可してください");
            }
        };
    </script>
</body>
</html>
