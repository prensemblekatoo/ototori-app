<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイク直結テスト</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #222; color: #fff; }
        #status { font-size: 20px; color: #0f0; margin: 20px; }
        button { padding: 20px 40px; font-size: 18px; border-radius: 15px; cursor: pointer; background: #fd7e14; color: white; border: none; }
    </style>
</head>
<body>
    <h2>マイク直結テスト</h2>
    <p>イヤホンを付けてからボタンを押してください</p>
    
    <button id="startBtn">1. マイクの音を聴く</button>
    
    <div id="status">ボタンを押してください</div>

    <script>
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            try {
                status.innerText = "マイク使用許可を確認中...";
                
                // 1. マイクを取得
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false, // テストのためエコー除去を切る
                        noiseSuppression: false
                    } 
                });

                // 2. オーディオコンテキスト開始
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);

                // 3. マイクの音をスピーカー（出力）に直接つなぐ！
                source.connect(audioCtx.destination);

                btn.style.display = 'none';
                status.innerText = "開通！マイクに向かって喋ってください。\n自分の声が聞こえますか？";
            } catch (err) {
                status.innerText = "エラー: " + err;
                console.error(err);
            }
        };
    </script>
</body>
</html>
