<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音取り出来る君 v2.5 - 最終完結版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 450px; margin: auto; }
        #feedback-light { width: 120px; height: 120px; border-radius: 50%; margin: 20px auto; background: #ccc; border: 5px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        #status { font-size: 16px; font-weight: bold; color: #d63384; min-height: 3em; margin: 15px; }
        button { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 16px; }
        .btn-orange { background: #fd7e14; color: white; width: 90%; }
        .btn-blue { background: #007bff; color: white; width: 90%; }
        .btn-green { background: #28a745; color: white; width: 45%; }
        .btn-red { background: #dc3545; color: white; width: 45%; }
    </style>
</head>
<body>

<div class="card">
    <h2>音取り出来る君 <small>v2.5</small></h2>
    
    <div id="feedback-light"></div>
    <div id="status">1. まずオレンジのボタンを押してください</div>

    <button id="startBtn" class="btn-orange">マイクを有効にする</button>

    <hr style="margin: 20px 0;">

    <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">
    <button onclick="document.getElementById('fileInput').click()" class="btn-blue">2. MIDIを読み込む</button>

    <div style="margin-top:20px;">
        <button id="playBtn" class="btn-green" disabled>再生</button>
        <button id="stopBtn" class="btn-red">停止</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.77,npm/@tonejs/midi@2.0.28"></script>
<script src="https://cdn.jsdelivr.net/npm/pitchy@4.0.0/dist/bundle-min.js"></script>

<script>
    let audioCtx, analyser, midiData;
    let tracksInfo = [];

    // ステップ1: マイクの開始（先ほどのテストコードと同じ仕組み）
    document.getElementById('startBtn').onclick = async () => {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await Tone.start();
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            // ここでスピーカーには繋がない（ハウリング防止）が、解析は開始する
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('status').innerText = "マイク開通！歌ってみてください";
            
            updateLoop();
        } catch (err) {
            document.getElementById('status').innerText = "エラー: " + err;
        }
    };

    function updateLoop() {
        requestAnimationFrame(updateLoop);
        if (!analyser) return;

        const data = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(data);
        
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i] * data[i];
        let volume = Math.sqrt(sum / data.length);

        const light = document.getElementById('feedback-light');
        const status = document.getElementById('status');

        if (volume > 0.01) { // 確実に声が出ている時
            const [pitch, clarity] = Pitchy.findPitch(data, audioCtx.sampleRate);
            
            if (clarity > 0.6) {
                const detectedMidi = 12 * (Math.log2(pitch / 440)) + 69;
                const targetMidi = getTargetMidi();
                
                if (targetMidi && Tone.Transport.state === 'started') {
                    const diff = Math.abs(detectedMidi - targetMidi);
                    if (diff < 1.0) light.style.background = "#28a745"; // 緑
                    else if (diff < 2.5) light.style.background = "#ffc107"; // 黄
                    else light.style.background = "#dc3545"; // 赤
                    status.innerText = `判定中: あなた=${Math.round(detectedMidi)} / 目標=${targetMidi}`;
                } else {
                    light.style.background = "#007bff"; // 青（声は出ている）
                    status.innerText = `音程検知: ${Math.round(detectedMidi)}\n(再生すると判定が始まります)`;
                }
            }
        } else {
            light.style.background = "#ccc";
            if (Tone.Transport.state === 'started') status.innerText = "もっと大きな声で！";
        }
    }

    function getTargetMidi() {
        const now = Tone.Transport.seconds;
        let target = null;
        if (midiData) {
            midiData.tracks.forEach((track, idx) => {
                if (idx === 0) { // とりあえず最初のトラックを目標にする
                    const note = track.notes.find(n => n.time <= now && (n.time + n.duration) >= now);
                    if (note) target = note.midi;
                }
            });
        }
        return target;
    }

    // ステップ2: MIDI読み込み
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        midiData = new Midi(arrayBuffer);
        
        midiData.tracks.forEach((track, index) => {
            if(track.notes.length === 0) return;
            const synth = new Tone.PolySynth(Tone.Synth).toDestination();
            tracksInfo[index] = { synth };
        });
        document.getElementById('playBtn').disabled = false;
        document.getElementById('status').innerText = "MIDI読み込み完了！再生してください";
    };

    document.getElementById('playBtn').onclick = () => {
        Tone.Transport.cancel();
        midiData.tracks.forEach((track, idx) => {
            if (!tracksInfo[idx]) return;
            new Tone.Part((time, note) => {
                tracksInfo[idx].synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            }, track.notes).start(0);
        });
        Tone.Transport.start();
        document.getElementById('status').innerText = "演奏中...";
    };

    document.getElementById('stopBtn').onclick = () => {
        Tone.Transport.stop();
        document.getElementById('status').innerText = "停止しました";
    };
</script>
</body>
</html>
