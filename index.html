<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音取り出来る君 v2.2</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 450px; margin: auto; }
        #feedback-light { width: 100px; height: 100px; border-radius: 50%; margin: 15px auto; background: #ccc; border: 5px solid white; transition: 0.1s; }
        #debug-info { font-family: monospace; font-size: 16px; font-weight: bold; color: #d63384; background: #fdf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; min-height: 80px; }
        button { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 16px; }
        .btn-main { background: #fd7e14; color: white; width: 90%; }
        .btn-sub { background: #007bff; color: white; width: 90%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>音取り出来る君 <small>v2.2</small></h2>
    
    <div id="feedback-light"></div>
    <div id="debug-info">ボタンを押して開始</div>

    <button id="startAllBtn" class="btn-main">1. マイクをオンにする</button>

    <hr style="margin: 20px 0;">

    <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">
    <button onclick="document.getElementById('fileInput').click()" class="btn-sub">2. MIDI読み込み</button>

    <div style="margin-top:20px;">
        <button id="playBtn" style="background:#28a745; color:white; width:45%;" disabled>再生</button>
        <button id="stopBtn" style="background:#dc3545; color:white; width:45%;">停止</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.77,npm/@tonejs/midi@2.0.28"></script>
<script src="https://cdn.jsdelivr.net/npm/pitchy@4.0.0/dist/bundle-min.js"></script>

<script>
    let audioCtx, analyser, midiData;
    let tracksInfo = [];

    document.getElementById('startAllBtn').onclick = async () => {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await Tone.start();
            
            // 【スマホ最適化】エコー除去やノイズ抑制をあえてOFFにして、生の音を拾う設定
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: true // これをONにして小さい声を大きくする
                } 
            });
            
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            document.getElementById('startAllBtn').style.display = "none";
            draw();
        } catch (err) {
            document.getElementById('debug-info').innerText = "マイクエラー: " + err.name;
        }
    };

    function draw() {
        requestAnimationFrame(draw);
        if (!analyser) return;

        const data = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(data);
        
        // 音量の計算（感度アップ）
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i] * data[i];
        let volume = Math.sqrt(sum / data.length);

        const light = document.getElementById('feedback-light');
        const debug = document.getElementById('debug-info');

        // 判定基準をさらに引き下げ (0.0000001)
        if (volume > 0.0000001) {
            const [pitch, clarity] = Pitchy.findPitch(data, audioCtx.sampleRate);
            
            if (clarity > 0.4) {
                light.style.background = "#28a745";
                debug.innerText = `【バッチリ！】\n音量: ${volume.toFixed(7)}\n音程: ${Math.round(pitch)}Hz`;
            } else {
                light.style.background = "#ffc107";
                debug.innerText = `【音を検知】\nもっと長くハッキリ声を出し続けて！\n音量: ${volume.toFixed(7)}`;
            }
        } else {
            light.style.background = "#ccc";
            debug.innerText = `【待機中】\nマイクに近づいて声を出し続けてください\n現在の音量: ${volume.toFixed(7)}`;
        }
    }

    // --- MIDI処理 ---
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        midiData = new Midi(arrayBuffer);
        document.getElementById('playBtn').disabled = false;
        document.getElementById('debug-info').innerText = "MIDI読み込み完了！再生して歌ってください";
        
        midiData.tracks.forEach((track, index) => {
            if(track.notes.length === 0) return;
            const synth = new Tone.PolySynth(Tone.Synth).toDestination();
            tracksInfo[index] = { synth };
        });
    };

    document.getElementById('playBtn').onclick = () => {
        Tone.Transport.cancel();
        midiData.tracks.forEach((track, idx) => {
            if (!tracksInfo[idx]) return;
            new Tone.Part((time, note) => {
                tracksInfo[idx].synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            }, track.notes).start(0);
        });
        Tone.Transport.start();
    };

    document.getElementById('stopBtn').onclick = () => Tone.Transport.stop();
</script>
</body>
</html>
