<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音取り出来る君 v1.6.1 - 音数表示版</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; color: #333; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .track-list { text-align: left; margin: 15px 0; border: 1px solid #ddd; padding: 10px; border-radius: 10px; max-height: 200px; overflow-y: auto; }
        .track-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .track-info { flex: 1; font-weight: bold; font-size: 14px; }
        .note-count { font-weight: normal; color: #888; font-size: 12px; margin-left: 5px; }
        
        .mode-btn { width: 80px; padding: 8px; font-size: 12px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; transition: 0.2s; }
        .mode-main { background: #ffc107; color: #000; font-weight: bold; }
        .mode-sub { background: #e2e3e5; color: #666; }
        .mode-off { background: #fff; color: #ccc; border-style: dashed; }

        button.main-action { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; cursor: pointer; margin: 5px; width: 45%; }
        .nav-btn { background: #6c757d; color: white; border: none; padding: 8px; border-radius: 5px; width: 45%; cursor: pointer; }
        .control-panel { background: #e9ecef; padding: 15px; border-radius: 15px; margin-top: 15px; }
        .loop-settings { display: flex; justify-content: space-around; margin: 10px 0; }
        .loop-settings input { width: 50px; text-align: center; font-size: 16px; }
        .counter { font-size: 28px; font-weight: bold; color: #007bff; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>音取り出来る君 <small>v1.6.1</small></h2>
    
    <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">
    <button onclick="document.getElementById('fileInput').click()" style="background:#007bff; color:white; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer;">MIDI読み込み</button>

    <div class="track-list" id="trackList">
        <p style="color:#999; text-align:center;">読み込むとパートが出ます</p>
    </div>

    <div class="control-panel">
        <div class="counter" id="measureCounter">1.1</div>
        <div class="loop-settings">
            <div>開始:<input type="number" id="startMeasure" value="1"></div>
            <div>終了:<input type="number" id="endMeasure" value="5"></div>
        </div>
        <div style="margin-bottom: 15px;">
            <button class="nav-btn" onclick="adjustTime(-1)">◀ 1拍戻る</button>
            <button class="nav-btn" onclick="adjustTime(1)">1拍進む ▶</button>
        </div>
        <label>速度: <span id="speedVal">1.0</span>x</label><br>
        <input type="range" id="speedRange" min="0.5" max="1.5" step="0.1" value="1.0" style="width:90%">
        <div style="margin-top:15px;">
            <button id="playBtn" class="main-action" disabled>再生</button>
            <button id="stopBtn" class="main-action" style="background:#dc3545;">停止</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.77,npm/@tonejs/midi@2.0.28"></script>

<script>
    let midiData = null;
    let baseBpm = 120;
    let tracksInfo = [];

    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        midiData = new Midi(arrayBuffer);

        if (midiData.header.tempos.length > 0) {
            baseBpm = midiData.header.tempos[0].bpm;
            Tone.Transport.bpm.value = baseBpm;
        }

        const listDiv = document.getElementById('trackList');
        listDiv.innerHTML = "";
        
        tracksInfo.forEach(t => { if(t.synth) t.synth.dispose(); if(t.vol) t.vol.dispose(); });
        tracksInfo = [];

        midiData.tracks.forEach((track, index) => {
            if(track.notes.length === 0) return;

            const vol = new Tone.Volume(0).toDestination();
            const synth = new Tone.PolySynth(Tone.Synth).connect(vol);
            const mode = (index === 0) ? 'main' : 'sub';
            tracksInfo[index] = { synth, vol, mode };

            // 音数をカウント
            const noteCount = track.notes.length;

            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <div class="track-info">
                    Part ${index+1} 
                    <span class="note-count">(${noteCount}音)</span>
                </div>
                <button id="btn-${index}" class="mode-btn mode-${mode}" onclick="toggleMode(${index})">
                    ${mode.toUpperCase()}
                </button>
            `;
            listDiv.appendChild(div);
            applyVolume(index);
        });
        document.getElementById('playBtn').disabled = false;
    };

    function toggleMode(idx) {
        const modes = ['main', 'sub', 'off'];
        let currentIdx = modes.indexOf(tracksInfo[idx].mode);
        let nextMode = modes[(currentIdx + 1) % modes.length];
        tracksInfo[idx].mode = nextMode;
        const btn = document.getElementById(`btn-${idx}`);
        btn.className = `mode-btn mode-${nextMode}`;
        btn.innerText = nextMode.toUpperCase();
        applyVolume(idx);
    }

    function applyVolume(idx) {
        const mode = tracksInfo[idx].mode;
        const volNode = tracksInfo[idx].vol.volume;
        if (mode === 'main') volNode.value = 0;
        if (mode === 'sub')  volNode.value = -15;
        if (mode === 'off')  volNode.value = -100;
    }

    document.getElementById('playBtn').onclick = async () => {
        await Tone.start();
        if (Tone.Transport.state === 'started') return;
        Tone.Transport.cancel();
        
        const startM = Math.max(0, parseInt(document.getElementById('startMeasure').value) - 1);
        const endM = parseInt(document.getElementById('endMeasure').value);
        
        midiData.tracks.forEach((track, idx) => {
            if (!tracksInfo[idx] || tracksInfo[idx].mode === 'off') return;
            new Tone.Part((time, note) => {
                tracksInfo[idx].synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            }, track.notes).start(0);
        });

        Tone.Transport.loop = true;
        Tone.Transport.loopStart = `${startM}:0:0`;
        Tone.Transport.loopEnd = `${endM}:0:0`;
        Tone.Transport.position = `${startM}:0:0`;
        Tone.Transport.start();
        document.getElementById('playBtn').innerText = "演奏中";
    };

    document.getElementById('stopBtn').onclick = () => {
        Tone.Transport.stop();
        document.getElementById('playBtn').innerText = "再生";
    };

    function adjustTime(beats) {
        let now = Tone.Transport.position.split(':');
        let b = parseInt(now[1]) + beats;
        if (b < 0) b = 0;
        Tone.Transport.position = `${now[0]}:${b}:${now[2]}`;
    }

    document.getElementById('speedRange').oninput = (e) => {
        const ratio = e.target.value;
        document.getElementById('speedVal').innerText = ratio;
        Tone.Transport.bpm.value = baseBpm * ratio;
    };

    setInterval(() => {
        if (Tone.Transport.state === 'started') {
            const p = Tone.Transport.position.split(':');
            document.getElementById('measureCounter').innerText = `${parseInt(p[0])+1}.${parseInt(p[1])+1}`;
        }
    }, 100);
</script>
</body>
</html>
