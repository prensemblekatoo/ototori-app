<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音取り出来る君 v2.0</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 450px; margin: auto; }
        #feedback-light { width: 100px; height: 100px; border-radius: 50%; margin: 15px auto; background: #ccc; border: 5px solid white; }
        #debug-info { font-family: monospace; font-size: 11px; color: #d63384; background: #fdf2f8; padding: 10px; border-radius: 5px; margin-top: 10px; min-height: 50px; }
        button { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-blue { background: #007bff; color: white; width: 90%; }
        .btn-orange { background: #fd7e14; color: white; width: 90%; } /* マイク専用ボタン */
        .btn-green { background: #28a745; color: white; width: 45%; }
        .btn-red { background: #dc3545; color: white; width: 45%; }
    </style>
</head>
<body>

<div class="card">
    <h2>音取り出来る君 <small>v2.0</small></h2>
    
    <div id="feedback-light"></div>
    <div id="debug-info">1. まず下のオレンジ色のボタンを押してください</div>

    <button id="micInitBtn" class="btn-orange">【最優先】マイクを強制ONにする</button>

    <hr>

    <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">
    <button onclick="document.getElementById('fileInput').click()" class="btn-blue">2. MIDIファイルを読み込む</button>

    <div id="trackList" style="text-align:left; margin:10px;"></div>

    <div style="background:#e9ecef; padding:15px; border-radius:15px;">
        <button id="playBtn" class="btn-green" disabled>3. 練習スタート</button>
        <button id="stopBtn" class="btn-red">停止</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.77,npm/@tonejs/midi@2.0.28"></script>
<script src="https://cdn.jsdelivr.net/npm/pitchy@4.0.0/dist/bundle-min.js"></script>

<script>
    let analyser, micStream;
    let midiData = null;
    let tracksInfo = [];

    // マイク起動だけを単独で行う
    document.getElementById('micInitBtn').onclick = async () => {
        try {
            // Tone.jsのオーディオコンテキストを開始
            await Tone.start();
            
            // マイクへのアクセス
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(micStream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            document.getElementById('micInitBtn').style.background = "#6c757d";
            document.getElementById('micInitBtn').innerText = "マイク起動完了";
            document.getElementById('debug-info').innerText = "マイクが繋がりました！歌うと反応するか試してください。";
            
            // 解析ループ開始
            startAnalysisLoop();
        } catch (err) {
            document.getElementById('debug-info').innerText = "マイク起動失敗: " + err;
        }
    };

    function startAnalysisLoop() {
        const data = new Float32Array(analyser.fftSize);
        const light = document.getElementById('feedback-light');
        const debug = document.getElementById('debug-info');

        const loop = () => {
            analyser.getFloatTimeDomainData(data);
            
            let sum = 0;
            for(let i=0; i<data.length; i++) sum += data[i] * data[i];
            let volume = Math.sqrt(sum / data.length);

            // 音量バーのようにデバッグ表示
            if (volume > 0.0001) {
                const [pitch, clarity] = Pitchy.findPitch(data, 44000); // 簡易レート
                light.style.background = (clarity > 0.5) ? "#28a745" : "#ffc107";
                debug.innerText = `反応中！\n音量: ${volume.toFixed(5)}\n音程(目安): ${Math.round(pitch)}Hz`;
            } else {
                light.style.background = "#ccc";
                debug.innerText = `声を待っています...\n現在の音量: ${volume.toFixed(5)}`;
            }
            requestAnimationFrame(loop);
        };
        loop();
    }

    // --- MIDI読み込みと再生は以前と同じ ---
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        midiData = new Midi(arrayBuffer);
        
        const listDiv = document.getElementById('trackList');
        listDiv.innerHTML = "";
        midiData.tracks.forEach((track, index) => {
            if(track.notes.length === 0) return;
            const vol = new Tone.Volume(0).toDestination();
            const synth = new Tone.PolySynth(Tone.Synth).connect(vol);
            tracksInfo[index] = { synth, vol, mode: (index === 0 ? 'main' : 'sub') };
            listDiv.innerHTML += `<div>Part ${index+1} </div>`;
        });
        document.getElementById('playBtn').disabled = false;
    };

    document.getElementById('playBtn').onclick = () => {
        Tone.Transport.cancel();
        midiData.tracks.forEach((track, idx) => {
            if (!tracksInfo[idx]) return;
            new Tone.Part((time, note) => {
                tracksInfo[idx].synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            }, track.notes).start(0);
        });
        Tone.Transport.start();
    };

    document.getElementById('stopBtn').onclick = () => Tone.Transport.stop();
</script>
</body>
</html>
