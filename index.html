<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音取り出来る君 v2.1</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 450px; margin: auto; }
        #feedback-light { width: 100px; height: 100px; border-radius: 50%; margin: 15px auto; background: #ccc; border: 5px solid white; transition: 0.1s; }
        #debug-info { font-family: monospace; font-size: 14px; color: #d63384; background: #fdf2f8; padding: 15px; border-radius: 10px; margin: 15px 0; min-height: 80px; white-space: pre-wrap; }
        button { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 16px; }
        .btn-main { background: #fd7e14; color: white; width: 90%; box-shadow: 0 4px #c86511; }
        .btn-main:active { box-shadow: none; transform: translateY(4px); }
        .btn-sub { background: #007bff; color: white; width: 90%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>音取り出来る君 <small>v2.1</small></h2>
    
    <div id="feedback-light"></div>
    
    <div id="debug-info">
        1. 下のオレンジのボタンを押して
        マイクを許可してください
    </div>

    <button id="startAllBtn" class="btn-main">マイクと音を有効にする</button>

    <hr style="margin: 20px 0;">

    <input type="file" id="fileInput" accept=".mid,.midi" style="display:none">
    <button onclick="document.getElementById('fileInput').click()" class="btn-sub">2. MIDIを読み込む</button>

    <div id="trackList" style="text-align:left; margin:10px; font-size: 12px;"></div>

    <div style="margin-top:20px;">
        <button id="playBtn" style="background:#28a745; color:white; width:45%;" disabled>再生</button>
        <button id="stopBtn" style="background:#dc3545; color:white; width:45%;">停止</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.77,npm/@tonejs/midi@2.0.28"></script>
<script src="https://cdn.jsdelivr.net/npm/pitchy@4.0.0/dist/bundle-min.js"></script>

<script>
    let audioCtx, analyser, midiData;
    let tracksInfo = [];

    // ボタンクリック時にすべてを一斉に初期化（ブラウザの制限を突破する唯一の方法）
    document.getElementById('startAllBtn').onclick = async () => {
        try {
            // 1. AudioContextの作成
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await Tone.start(); // Tone.jsも同時に開始
            
            // 2. マイクの取得
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            document.getElementById('startAllBtn').style.display = "none";
            document.getElementById('debug-info').innerText = "マイク稼働中...\n歌ってみてください！";

            // 3. ループ開始
            draw();
        } catch (err) {
            document.getElementById('debug-info').innerText = "エラー発生：\n" + err.name + "\n" + err.message;
        }
    };

    function draw() {
        requestAnimationFrame(draw);
        if (!analyser) return;

        const data = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(data);
        
        // 音量の計算
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i] * data[i];
        let volume = Math.sqrt(sum / data.length);

        const light = document.getElementById('feedback-light');
        const debug = document.getElementById('debug-info');

        // 超・超高感度 (0.000001)
        if (volume > 0.000001) {
            const [pitch, clarity] = Pitchy.findPitch(data, audioCtx.sampleRate);
            
            if (clarity > 0.5) {
                light.style.background = "#28a745";
                debug.innerText = `【反応あり！】\n音量: ${volume.toFixed(6)}\n音程: ${Math.round(pitch)}Hz`;
            } else {
                light.style.background = "#ffc107";
                debug.innerText = `【音を検知】\n音量: ${volume.toFixed(6)}\nハッキリ歌うと色が変わります`;
            }
        } else {
            light.style.background = "#ccc";
            debug.innerText = `【マイク待機中】\n音量: ${volume.toFixed(6)}\n(声が届けば数字が動きます)`;
        }
    }

    // --- MIDI処理 ---
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        midiData = new Midi(arrayBuffer);
        
        const listDiv = document.getElementById('trackList');
        listDiv.innerHTML = "読み込み完了：";
        midiData.tracks.forEach((track, index) => {
            if(track.notes.length === 0) return;
            const vol = new Tone.Volume(-6).toDestination();
            const synth = new Tone.PolySynth(Tone.Synth).connect(vol);
            tracksInfo[index] = { synth, vol };
            listDiv.innerHTML += `<div>パート ${index+1} (${track.notes.length}音)</div>`;
        });
        document.getElementById('playBtn').disabled = false;
    };

    document.getElementById('playBtn').onclick = () => {
        Tone.Transport.cancel();
        midiData.tracks.forEach((track, idx) => {
            if (!tracksInfo[idx]) return;
            new Tone.Part((time, note) => {
                tracksInfo[idx].synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            }, track.notes).start(0);
        });
        Tone.Transport.start();
    };

    document.getElementById('stopBtn').onclick = () => Tone.Transport.stop();
</script>
</body>
</html>
